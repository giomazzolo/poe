<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="490" viewBox="0 0 1060 490" role="img" aria-label="Empty Lord's Labyrinth map">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1c241c"/>
      <stop offset="55%" stop-color="#101610"/>
      <stop offset="100%" stop-color="#070907"/>
    </radialGradient>
    <radialGradient id="zone" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3a4634"/>
      <stop offset="55%" stop-color="#232c22"/>
      <stop offset="100%" stop-color="#121712"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a7a55" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2a3328" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1060" height="490" fill="url(#bg)"/>
  <rect width="1060" height="490" fill="#000" opacity="0.18"/>

  <!-- Connecting paths (unexplored) -->
  <g fill="none" stroke="#5a6b4a" stroke-width="7" stroke-linecap="round" opacity="0.55" filter="url(#soft)">
    <path d="M170 360 L300 290 L440 210 L580 150 L720 210 L860 150"/>
    <path d="M300 290 L440 350 L580 290 L720 360"/>
    <path d="M300 290 L300 150 L170 210"/>
    <path d="M440 210 L580 290"/>
    <path d="M720 210 L580 290"/>
  </g>
  <g fill="none" stroke="#8fa67a" stroke-width="2.5" stroke-linecap="round" opacity="0.35">
    <path d="M170 360 L300 290 L440 210 L580 150 L720 210 L860 150"/>
    <path d="M300 290 L440 350 L580 290 L720 360"/>
    <path d="M300 290 L300 150 L170 210"/>
    <path d="M440 210 L580 290"/>
    <path d="M720 210 L580 290"/>
  </g>

  <!-- Blank chambers (wiki Blankzone style) -->
  <g>
    <g transform="translate(170 360)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(300 290)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(440 210)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(580 150)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(720 210)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(860 150)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(440 350)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(580 290)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(720 360)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(300 150)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
    <g transform="translate(170 210)">
      <circle r="52" fill="url(#zone)" stroke="url(#edge)" stroke-width="3"/>
      <circle r="40" fill="none" stroke="#4e5d45" stroke-width="1.5" opacity="0.5"/>
    </g>
  </g>

  <!-- Left readability wash for card text -->
  <rect width="420" height="490" fill="url(#bg)" opacity="0.35"/>
  <rect width="1060" height="490" fill="#000" opacity="0.12"/>
</svg>
